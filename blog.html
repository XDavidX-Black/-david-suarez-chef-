<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Blog · David Suarez · Cocinero Privado</title>
<meta name="description" content="Recetas, ideas y notas de cocina del chef David Suarez.">
<style>
:root{--gold:#e8c45a;--bg:#0a0a0a;--bg2:#111;--card:#151515;--text:#ede8e0;--text2:#706860;--border:rgba(232,196,90,0.1);--transition:0.4s ease}
*{margin:0;padding:0;box-sizing:border-box}
html{scroll-behavior:smooth}
body{font-family:'Georgia','Times New Roman',serif;background:var(--bg);color:var(--text);line-height:1.7;overflow-x:hidden}
.container{max-width:1120px;margin:0 auto;padding:0 28px}

/* HEADER */
header{position:fixed;top:0;left:0;right:0;z-index:1000;padding:18px 0;background:rgba(10,10,10,0.92);backdrop-filter:blur(16px);border-bottom:1px solid var(--border);transition:transform 0.4s ease, padding 0.4s ease}header.hide{transform:translateY(-100%)}
header .container{display:flex;justify-content:space-between;align-items:center}
.brand{display:none}

nav{display:flex;align-items:center;width:100%}
.nav-left{display:flex;align-items:center;gap:28px}
.nav-right{display:flex;align-items:center;gap:16px;margin-left:auto}
nav a{color:var(--text2);text-decoration:none;font-size:.75rem;letter-spacing:2.5px;text-transform:uppercase;transition:color .3s;white-space:nowrap}
nav a:hover{color:var(--gold)}
.nav-brand{color:var(--gold)!important;letter-spacing:4px}
.nav-pipe{color:var(--border);font-size:.8rem;user-select:none}
.nav-dd{position:relative;display:inline-flex}
.nav-dd-toggle{color:var(--text2);font-size:1.1rem;cursor:pointer;transition:color .3s;line-height:1;padding:0 4px}
.nav-dd-toggle:hover,.nav-dd.open .nav-dd-toggle{color:var(--gold)}
.nav-dd-menu{position:absolute;top:100%;left:0;min-width:180px;background:var(--bg2);border:1px solid var(--border);padding:8px 0;opacity:0;pointer-events:none;transform:translateY(6px);transition:all .3s;z-index:100}
.nav-dd.open .nav-dd-menu,.nav-dd:hover .nav-dd-menu{opacity:1;pointer-events:auto;transform:translateY(4px)}
.nav-dd-menu a{display:block;padding:8px 20px;color:var(--text2);text-decoration:none;font-size:.75rem;letter-spacing:2px;text-transform:uppercase;transition:color .3s;white-space:nowrap}
.nav-dd-menu a:hover{color:var(--gold);background:rgba(232,196,90,0.05)}
.nav-social{display:flex;align-items:center;gap:12px;padding:0 10px}
.nav-social a{display:flex;align-items:center}
.nav-social a svg{width:15px;height:15px;color:var(--text2);transition:color .3s}
.nav-social a:hover svg{color:var(--gold)}
.btn-nav{background:var(--gold);color:#080808!important;padding:10px 22px;letter-spacing:2px;font-weight:600;font-size:.7rem}
.btn-nav:hover{background:var(--text);color:#080808!important}
.menu-toggle{display:none;flex-direction:column;gap:5px;cursor:pointer}
.menu-toggle span{display:block;width:22px;height:1.5px;background:var(--text);transition:var(--transition)}
@media(max-width:720px){
.menu-toggle{display:flex}
nav{position:fixed;top:0;right:-300px;width:280px;height:100vh;background:var(--bg2);flex-direction:column;padding:80px 40px;gap:0;box-shadow:-10px 0 40px rgba(0,0,0,.5);transition:right .4s ease;z-index:999}
nav.open{right:0}
.nav-left{flex-direction:column;align-items:flex-start;gap:20px;width:100%}
.nav-right{flex-direction:column;align-items:flex-start;gap:16px;margin-left:0;margin-top:20px;padding-top:20px;border-top:1px solid var(--border);width:100%}
nav a{font-size:.85rem}
.nav-pipe{display:none}
.nav-social{border-left:none;padding:0;gap:14px}
.nav-social a svg{width:18px;height:18px}
.btn-nav{text-align:center;width:100%}
.menu-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:998}
.menu-overlay.show{display:block}
}

/* HERO */
.hero{min-height:100vh;display:flex;align-items:center;justify-content:center;text-align:center;padding:140px 0 80px;background:radial-gradient(ellipse at center bottom,#151008 0%,#0a0a0a 60%)}
.hero-sub{font-size:.6rem;letter-spacing:6px;text-transform:uppercase;color:var(--gold);margin-bottom:20px}
.hero h2{font-size:clamp(2rem,5vw,3.8rem);font-weight:300;letter-spacing:3px;line-height:1.15;margin-bottom:18px}
.hero h2 em{font-style:normal;color:var(--gold)}
.hero p{color:var(--text2);font-size:.9rem;max-width:520px;margin:0 auto 36px}
.hero-btns{display:flex;justify-content:center;gap:14px;flex-wrap:wrap}
.btn{display:inline-flex;align-items:center;gap:8px;padding:16px 44px;background:var(--gold);color:#080808;text-decoration:none;letter-spacing:3px;text-transform:uppercase;font-size:.6rem;border:none;cursor:pointer;transition:all .3s;font-weight:600}
.btn:hover{background:var(--text);color:var(--bg);transform:translateY(-2px)}
.btn-outline{background:transparent;color:var(--gold);border:1px solid var(--gold)}
.btn-outline:hover{background:var(--gold);color:#080808}

/* SECTIONS */
section{padding:100px 0}
.section-label{font-size:.55rem;letter-spacing:6px;text-transform:uppercase;color:var(--gold);text-align:center;margin-bottom:6px}
.section-title{font-size:clamp(1.4rem,2.8vw,2.2rem);font-weight:300;letter-spacing:2px;text-align:center;margin-bottom:12px}
.section-desc{color:var(--text2);font-size:.85rem;text-align:center;max-width:560px;margin:0 auto 50px}


.paq-card h4{font-weight:400;letter-spacing:1.5px;font-size:.82rem;margin:0}
.paq-card p{color:var(--text2);font-size:.75rem;line-height:1.6;margin:0 0 10px}
.paq-card .precio{display:inline-block;font-size:.6rem;letter-spacing:2px;color:var(--gold);border:1px solid var(--border);padding:3px 10px;background:rgba(232,196,90,.05)}

/* TESTIMONIALS */
#testimonios{background:var(--bg)}
.test-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(300px,1fr));gap:20px}
.test-card{background:var(--card);padding:32px;border:1px solid var(--border)}
.test-card blockquote{color:var(--text2);font-size:.82rem;font-style:italic;margin-bottom:16px;line-height:1.7}
.test-author{display:flex;align-items:center;gap:14px}
.test-author img{width:44px;height:44px;border-radius:50%;object-fit:cover;background:var(--bg2)}
.test-author cite{font-style:normal;font-size:.8rem}
.test-author cite span{display:block;color:var(--text2);font-size:.65rem;margin-top:2px}

/* GALLERY */
#galeria{background:var(--bg2)}
.gal-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px}
.gal-item{overflow:hidden;aspect-ratio:1;cursor:pointer}
.gal-item img{width:100%;height:100%;object-fit:cover;transition:all .4s}
.gal-item:hover img{transform:scale(1.05);opacity:.8}
.gal-item:first-child{grid-column:span 2;grid-row:span 2;aspect-ratio:auto;min-height:340px}
@media(max-width:700px){.gal-grid{grid-template-columns:repeat(2,1fr)}.gal-item:first-child{grid-column:span 2;min-height:200px}}

/* BLOG */
#blog{background:var(--bg2)}
.blog-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(300px,1fr));gap:24px}
.blog-card{background:var(--card);border:1px solid var(--border);overflow:hidden;transition:all .3s}
.blog-card:hover{border-color:var(--gold)}
.blog-card img{width:100%;height:180px;object-fit:cover;display:block}
.blog-body{padding:20px}
.blog-date{font-size:.55rem;letter-spacing:2px;text-transform:uppercase;color:var(--text2);margin-bottom:6px}
.blog-body h4{font-weight:400;letter-spacing:1px;font-size:.82rem;margin-bottom:6px}
.blog-body p{color:var(--text2);font-size:.75rem;line-height:1.6}
.blog-body a{color:var(--gold);font-size:.65rem;letter-spacing:2px;text-transform:uppercase;text-decoration:none;display:inline-block;margin-top:10px;transition:color .3s}
.blog-body a:hover{color:var(--text)}

/* LOYALTY */
#lealtad{background:var(--bg)}
.leal-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(260px,1fr));gap:20px}
.leal-card{background:var(--card);border:1px solid var(--border);padding:32px;text-align:center;transition:all .3s}
.leal-card:hover{border-color:var(--gold)}
.leal-icon{font-size:2rem;margin-bottom:12px}
.leal-card h4{font-weight:400;letter-spacing:1.5px;font-size:.82rem;margin-bottom:8px}
.leal-card p{color:var(--text2);font-size:.78rem;line-height:1.6}

/* REVIEWS */
#resenas{background:var(--bg2)}
.review-grid{display:grid;grid-template-columns:1fr 1fr;gap:40px;align-items:start}
.review-list{display:flex;flex-direction:column;gap:16px}
.review-item{background:var(--card);padding:18px;border:1px solid var(--border)}
.review-item h5{font-weight:400;font-size:.78rem;margin-bottom:2px}
.review-stars{color:var(--gold);font-size:.8rem;letter-spacing:2px;margin-bottom:4px}
.review-item p{color:var(--text2);font-size:.72rem;line-height:1.6}
.review-item .rdate{font-size:.55rem;color:var(--text2);letter-spacing:1px;margin-top:4px;display:block}
.review-form textarea{width:100%;background:var(--bg2);border:1px solid var(--border);padding:12px 14px;color:var(--text);font:inherit;font-size:.78rem;resize:vertical;min-height:80px;margin-bottom:10px}
.review-form textarea:focus{outline:none;border-color:var(--gold)}
.review-form select{width:100%;background:var(--bg2);border:1px solid var(--border);padding:10px 14px;color:var(--text);font:inherit;font-size:.75rem;margin-bottom:10px}
.review-form select:focus{outline:none;border-color:var(--gold)}
.review-form select option{background:var(--bg)}
@media(max-width:700px){.review-grid{grid-template-columns:1fr}}

/* CONTACT */
#contacto{background:var(--bg)}
.contact-grid{display:grid;grid-template-columns:1fr 1fr;gap:60px;align-items:start}
.contact-info p{color:var(--text2);font-size:.82rem;margin-bottom:24px;line-height:1.7}
.contact-line{display:flex;align-items:center;gap:12px;margin-bottom:14px;color:var(--text2);font-size:.82rem}
.contact-line svg{width:18px;height:18px;color:var(--gold);flex-shrink:0}
.contact-line a{color:var(--text2);text-decoration:none;transition:color .3s}
.contact-line a:hover{color:var(--gold)}
.contact-line strong{color:var(--text);font-weight:400}
.form-group{margin-bottom:16px}
.form-group label{display:block;font-size:.65rem;letter-spacing:2px;text-transform:uppercase;color:var(--text2);margin-bottom:6px}
.form-group input,.form-group select,.form-group textarea{width:100%;background:var(--bg2);border:1px solid var(--border);padding:13px 16px;color:var(--text);font:inherit;font-size:.8rem;transition:border .3s}
.form-group input:focus,.form-group select:focus,.form-group textarea:focus{outline:none;border-color:var(--gold)}
.form-group textarea{resize:vertical;min-height:90px}
.form-group select option{background:var(--bg)}
.btn-form{width:100%;padding:16px;background:var(--gold);color:#080808;border:none;cursor:pointer;letter-spacing:3px;text-transform:uppercase;font-size:.6rem;font-weight:600;transition:all .3s;font-family:inherit}
.btn-form:hover{background:var(--text);color:var(--bg)}
#formStatus{text-align:center;margin-top:12px;font-size:.8rem;color:var(--gold)}
@media(max-width:780px){.contact-grid{grid-template-columns:1fr;gap:40px}}

/* FAQ */
#faq{background:var(--bg2)}
.faq-wrap{max-width:700px;margin:0 auto}
.faq-item{border-bottom:1px solid var(--border)}
summary{width:100%;background:none;border:none;color:var(--text);padding:18px 0;font:inherit;font-size:.82rem;text-align:left;cursor:pointer;display:flex;justify-content:space-between;align-items:center;letter-spacing:.5px;list-style:none}
summary::-webkit-details-marker{display:none}
summary:hover{color:var(--gold)}
summary::after{content:'+';color:var(--gold);font-size:1rem;transition:transform .3s}
details[open] summary::after{transform:rotate(45deg)}
.faq-answer{padding:0 0 18px;color:var(--text2);font-size:.8rem;line-height:1.7}
.faq-cta{text-align:center;margin-top:40px}
.faq-cta p{color:var(--text2);font-size:.82rem;margin-bottom:16px}
.faq-cta a{color:var(--gold);text-decoration:none;letter-spacing:2px;text-transform:uppercase;font-size:.7rem;border:1px solid var(--gold);padding:12px 28px;display:inline-block;transition:all .3s}
.faq-cta a:hover{background:var(--gold);color:#080808}

/* SHARE */
.share-wrap{text-align:center;margin-top:30px}
.share-wrap p{font-size:.65rem;letter-spacing:2px;text-transform:uppercase;color:var(--text2);margin-bottom:12px}
.share-btns{display:flex;justify-content:center;gap:10px;flex-wrap:wrap}
.share-btns a{display:inline-flex;align-items:center;gap:6px;padding:8px 18px;background:var(--card);border:1px solid var(--border);color:var(--text2);text-decoration:none;font-size:.65rem;letter-spacing:1px;text-transform:uppercase;transition:all .3s}
.share-btns a:hover{background:var(--gold);color:#080808;border-color:var(--gold)}
.share-btns a svg{width:14px;height:14px}

/* TERMS */
#terminos{background:var(--bg);padding:60px 0}
.terms-wrap{max-width:700px;margin:0 auto}
.terms-wrap details{margin-bottom:8px}
.terms-wrap summary{font-size:.78rem;letter-spacing:1px;color:var(--gold)}
.terms-grid{display:grid;grid-template-columns:1fr 1fr;gap:0 40px}
.terms-col h5{font-size:.65rem;letter-spacing:2px;text-transform:uppercase;color:var(--gold);margin:20px 0 10px;font-weight:400}
.terms-col ul{list-style:none;padding:0}
.terms-col li{color:var(--text2);font-size:.78rem;line-height:1.7;padding:3px 0;position:relative;padding-left:14px}
.terms-col li::before{content:'\2013';position:absolute;left:0;color:var(--gold)}
@media(max-width:600px){.terms-grid{grid-template-columns:1fr}}

/* FOOTER */
footer{padding:50px 0;text-align:center;border-top:1px solid var(--border)}
footer .social{display:flex;justify-content:center;gap:24px;margin-bottom:16px}
footer .social a{color:var(--text2);text-decoration:none;font-size:.65rem;letter-spacing:3px;text-transform:uppercase;transition:color .2s;display:inline-flex;align-items:center;gap:6px}
footer .social a:hover{color:var(--gold)}
footer .social a svg{width:13px;height:13px}
footer p{font-size:.65rem;color:var(--text2);letter-spacing:2px}

/* CHATBOT */
#chat-btn{position:fixed;bottom:30px;right:24px;z-index:999;width:50px;height:50px;background:var(--gold);border:none;border-radius:50%;cursor:pointer;font-size:1.2rem;display:flex;align-items:center;justify-content:center;transition:all .3s;box-shadow:0 4px 20px rgba(232,196,90,.25);color:#080808}
#chat-btn:hover{transform:scale(1.08);background:var(--text)}
#chat-window{position:fixed;bottom:95px;right:24px;z-index:999;width:340px;max-height:450px;background:var(--card);border:1px solid var(--border);display:none;flex-direction:column;box-shadow:0 20px 60px rgba(0,0,0,.5)}
#chat-window.open{display:flex}
#chat-header{display:flex;justify-content:space-between;align-items:center;padding:14px 18px;border-bottom:1px solid var(--border);background:var(--bg2)}
#chat-header h4{font-size:.75rem;letter-spacing:2px;text-transform:uppercase;color:var(--gold);font-weight:400}
#chat-header button{background:none;border:none;color:var(--text2);cursor:pointer;font-size:1rem}
#chat-header button:hover{color:var(--gold)}
#chat-msgs{flex:1;padding:14px 18px;overflow-y:auto;display:flex;flex-direction:column;gap:8px;max-height:290px}
.chat-msg{max-width:88%;padding:9px 12px;font-size:.75rem;line-height:1.5}
.chat-msg.bot{align-self:flex-start;background:var(--bg2);color:var(--text);border:1px solid var(--border)}
.chat-msg.user{align-self:flex-end;background:var(--gold);color:#080808}
#chat-inputs{padding:10px 18px;border-top:1px solid var(--border);display:flex;flex-wrap:wrap;gap:5px}
#chat-inputs button{background:var(--bg2);border:1px solid var(--border);color:var(--text2);padding:7px 10px;font-size:.65rem;cursor:pointer;transition:all .2s;letter-spacing:1px;text-transform:uppercase;font-family:inherit}
#chat-inputs button:hover{background:var(--gold);color:#080808;border-color:var(--gold)}
@media(max-width:500px){#chat-window{width:calc(100vw - 48px);right:24px;bottom:85px}}

/* BACK TO TOP */
.back-top{position:fixed;bottom:95px;right:24px;z-index:999;width:42px;height:42px;background:var(--gold);color:#080808;border:none;cursor:pointer;font-size:1.1rem;opacity:0;pointer-events:none;transition:all .3s}
.back-top.show{opacity:1;pointer-events:auto}
.back-top:hover{background:var(--text);color:var(--bg)}

/* STATS */
.stats{display:flex;justify-content:center;gap:40px;margin-top:40px;flex-wrap:wrap}
.stat-item{text-align:center}
.stat-num{font-size:clamp(1.6rem,3vw,2.6rem);font-weight:300;color:var(--gold);letter-spacing:2px}
.stat-label{font-size:.6rem;letter-spacing:3px;text-transform:uppercase;color:var(--text2);margin-top:4px}

/* PRINT */
@media print{header,.back-top,#chat-btn,#chat-window,.btn,.btn-nav,.btn-form,.hero-btns,.share-btns,.wa-float,.avail-bar,.lang-toggle{display:none!important}body{background:#fff;color:#000;font-size:11pt}section{padding:20px 0!important;page-break-inside:avoid}.container{max-width:100%;padding:0}.serv-card,.test-card,.blog-card,.paq-card,.leal-card,.review-item{break-inside:avoid;border:1px solid #ccc;background:#fff}.precio,.stat-num{color:#333}.section-label{color:#666}h2,h3{color:#000}}

/* AVAILABILITY BAR */
.avail-bar{background:rgba(232,196,90,0.08);border-bottom:1px solid var(--border);padding:8px 0;font-size:.65rem;letter-spacing:1.5px;color:var(--text2);text-align:center;position:relative;z-index:999}
.avail-bar span{color:var(--gold);font-weight:600}
.avail-bar.hide{display:none}

/* LANGUAGE TOGGLE */
.lang-toggle{background:none;border:1px solid var(--border);color:var(--text2);padding:4px 10px;font-size:.6rem;letter-spacing:1.5px;text-transform:uppercase;cursor:pointer;transition:all .3s;font-family:inherit;margin-left:8px;line-height:1}
.lang-toggle:hover{color:var(--gold);border-color:var(--gold)}

/* TESTIMONIAL FILTERS */
.test-filters{display:flex;justify-content:center;gap:8px;flex-wrap:wrap;margin-bottom:30px}
.test-filter{background:transparent;border:1px solid var(--border);color:var(--text2);padding:6px 16px;font-size:.6rem;letter-spacing:2px;text-transform:uppercase;cursor:pointer;transition:all .3s;font-family:inherit}
.test-filter:hover,.test-filter.active{color:var(--gold);border-color:var(--gold);background:rgba(232,196,90,0.05)}

/* BUDGET CALCULATOR - WIZARD */


/* MAP */
#mapa{background:var(--bg)}
.map-wrap{max-width:800px;margin:0 auto;border:1px solid var(--border);overflow:hidden}
.map-wrap iframe{width:100%;height:360px;display:block;filter:grayscale(1) invert(.9);border:none}

/* INSTAGRAM FEED */
#instagram{background:var(--bg2)}
.ig-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;max-width:700px;margin:0 auto}
.ig-item{aspect-ratio:1;overflow:hidden;position:relative}
.ig-item img{width:100%;height:100%;object-fit:cover;transition:all .4s}
.ig-item:hover img{transform:scale(1.05);opacity:.7}
.ig-item::after{content:'Instagram';position:absolute;bottom:0;left:0;right:0;background:rgba(0,0,0,.7);padding:6px 10px;font-size:.5rem;letter-spacing:1.5px;text-transform:uppercase;color:var(--text2);opacity:0;transition:opacity .3s}
.ig-item:hover::after{opacity:1}
@media(max-width:600px){.ig-grid{grid-template-columns:repeat(2,1fr)}}

/* ANIMATED COUNTER */
.stat-num.counting{opacity:0;transform:translateY(12px);animation:countIn .6s forwards}
@keyframes countIn{to{opacity:1;transform:translateY(0)}}

@media(max-width:480px){
section{padding:60px 0}
.hero h2{font-size:clamp(1.6rem,7vw,2.4rem);letter-spacing:1px}
.hero{padding:100px 0 60px}
.serv-card img{height:160px}
.serv-grid{grid-template-columns:1fr}
.test-grid{grid-template-columns:1fr}
.gal-item:first-child{min-height:160px}
.gal-grid{gap:4px}
.contact-grid{gap:28px}
.container{padding:0 16px}
.terms-wrap summary{font-size:.75rem}
.stats{gap:20px}
.paq-grid{grid-template-columns:1fr}
.blog-grid{grid-template-columns:1fr}
.leal-grid{grid-template-columns:1fr}
}

.blog-hero{padding:140px 0 60px;text-align:center;background:radial-gradient(ellipse at center bottom,#151008 0%,#0a0a0a 60%)}
.blog-hero h1{font-size:clamp(1.6rem,3vw,2.4rem);font-weight:300;letter-spacing:2px;margin-bottom:8px}
.blog-hero .blog-date{color:var(--gold);font-size:.65rem;letter-spacing:3px;text-transform:uppercase}
.blog-content{max-width:720px;margin:0 auto;padding:60px 28px 80px}
.blog-content img{width:100%;border-radius:4px;margin-bottom:40px}
.blog-content h3{font-size:1.1rem;font-weight:400;letter-spacing:1.5px;color:var(--gold);margin:36px 0 14px}
.blog-content p{color:var(--text2);font-size:.85rem;line-height:1.9;margin-bottom:18px}
.blog-content ul{list-style:none;padding:0;margin:0 0 18px}
.blog-content ul li{color:var(--text2);font-size:.82rem;padding:5px 0 5px 20px;position:relative}
.blog-content ul li::before{content:"—";position:absolute;left:0;color:var(--gold)}

<script>
const posts = {"1":{"title":"Tacos de pescado con salsa de tamarindo","date":"15 Jun 2026","img":"https://rjdavx8ozyznxeyh.public.blob.vercel-storage.com/production/websites/generated-media/6fe67570-ee94-4c66-b111-9b482f180bae-xJuV8p964ZvkWHrDCRGrDmRoUZBLuA.png","alt":"Tacos artesanales","content":"<p>La combinación que nadie espera y todos recuerdan. Crujientes, frescos y con un toque ácido que los hace adictivos.</p><p>Estos tacos los preparé por primera vez para una cena en Playa del Carmen, cuando una clienta me pidió algo que sorprendiera a sus invitados. El secreto está en la salsa de tamarindo: ni muy dulce, ni muy ácida, justo en el punto donde el picante del chile se encuentra con la frescura del pescado.</p><h3>Ingredientes clave</h3><ul><li>Pescado blanco fresco (robalo o huachinango)</li><li>Tamarindo natural</li><li>Chile habanero (la cantidad que te atrevas)</li><li>Tortillas de maíz artesanales</li><li>Cebolla morada encurtida</li><li>Cilantro fresco</li></ul><p>Lo mejor de esta receta es que se prepara en menos de 30 minutos y el resultado parece de restaurante. Ideal para una cena entre semana cuando querés impresionar sin pasar todo el día en la cocina.</p>"},"2":{"title":"Ceviche de mango y chile habanero","date":"2 Jun 2026","img":"https://rjdavx8ozyznxeyh.public.blob.vercel-storage.com/production/websites/generated-media/cbb6b43d-31fc-45f9-975c-872318c453ca-8D2z0Uxue3yIZzY6jFZxitEyNBPOXt.png","alt":"Ceviche fresco","content":"<p>El calor de Quintana Roo pide algo fresco. Este ceviche lo preparo cuando quiero que mis invitados cierren los ojos al probarlo.</p><p>El mango maduro pero firme le da el contraste perfecto con el chile habanero. No le tengas miedo al picante — bien usado, el habanero no quema, despierta.</p><h3>Tips del chef</h3><p>Usá pescado fresco del día, cortado en cubos pequeños. El baño de limón debe ser de 10 a 15 minutos, no más — querés que el pescado se cocine en el ácido pero mantenga su textura.</p><p>Agregá el mango justo antes de servir para que no se deshaga. Y servilo en tostadas de maíz o en un vaso con una cuchara. Acompañá con una cerveza bien fría o un mezcal artesanal.</p>"},"3":{"title":"Brownie de chocolate amargo con sal marina","date":"20 May 2026","img":"https://rjdavx8ozyznxeyh.public.blob.vercel-storage.com/production/websites/generated-media/0735de16-3aa7-4b70-bad9-f6819d10e04b-cpc0HmE68g8NUxZEoFFxtTeS4NlyMN.png","alt":"Postre de chocolate","content":"<p>El postre más sencillo que conozco, pero si usás buen chocolate y no lo cocinas de más, se vuelve inolvidable.</p><p>La sal marina no es decoración — realza el chocolate amargo y limpia el paladar. Es el detalle que hace que la gente pregunte: ¿qué le pusiste?</p><h3>El secreto</h3><p>Chocolate con mínimo 70% de cacao. Mantequilla sin sal. Huevos a temperatura ambiente. No batas de más después de agregar la harina — querés que el brownie quede denso, no aireado.</p><p>Hornealo hasta que los bordes estén firmes pero el centro todavía tiembla ligeramente. Dejalo enfriar completamente antes de cortar. Y sí, la sal marina va justo antes de servir.</p>"}};
const params = new URLSearchParams(window.location.search);
const id = params.get("id") || "1";
const post = posts[id];
if (post) {
  document.getElementById("post-title").textContent = post.title;
  document.getElementById("post-date").textContent = post.date;
  document.getElementById("post-content").innerHTML = '<img src="' + post.img + '" alt="' + post.alt + '" loading="lazy">' + post.content;
  document.title = post.title + " · David Suarez";
}
